<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор цены геймпасса - Нахождение исходного числа</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 18px;
            font-weight: 500;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: #555;
            font-size: 15px;
        }

        .result-value {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 700;
            color: #764ba2;
            font-size: 18px;
        }

        .total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .total .result-label {
            font-family: 'Inter', sans-serif;
            color: rgba(255, 255, 255, 0.9);
        }

        .total .result-value {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            color: white;
            font-size: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .reset-btn {
            background: #6c757d;
            margin-top: 10px;
            background: linear-gradient(135deg, #868f96 0%, #596164 100%);
        }

        .info {
            text-align: center;
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #999;
        }

        .formula {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Калькулятор процентов</h1>
            <p>Находит цену геймпасса за которую нужно выставить его и получить робуксы</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label>Введите сколько должен получить:</label>
                <input type="number" id="inputNumber" placeholder="Например: 70" step="any">
            </div>
            
            <button onclick="calculate()">Рассчитать →</button>
            
            <div id="resultArea"></div>
            
            <button onclick="resetForm()" class="reset-btn" style="margin-top: 10px;">⟳ Сбросить</button>
            
            <div class="info">
                <strong>Формула:</strong> Исходное число = Введённое число ÷ 0.7
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const inputElement = document.getElementById('inputNumber');
            const resultArea = document.getElementById('resultArea');
            let inputValue = inputElement.value.trim();
            
            resultArea.innerHTML = '';
            
            if (inputValue === '') {
                showError('Пожалуйста, введите число!');
                return;
            }
            
            const number = parseFloat(inputValue);
            
            if (isNaN(number)) {
                showError('Ошибка! Введите корректное число!');
                return;
            }
            
            const original = number / 0.7;
            const percent30 = original * 0.3;
            const result = original - percent30;
            
            resultArea.innerHTML = `
                <div class="result">
                    <div class="result-card">
                        <div class="result-row">
                            <span class="result-label">За сколько выставить:</span>
                            <span class="result-value">${original.toFixed(2)}</span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Комиссия Roblox:</span>
                            <span class="result-value">${percent30.toFixed(2)}</span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Сколько получит:</span>
                            <span class="result-value">${result.toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="total">
                        <div class="result-row">
                            <span class="result-label">Выставите ваш gamepass за:</span>
                            <span class="result-value">${original.toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="formula">
                        ${original.toFixed(2)} - 30% = ${result.toFixed(2)}
                    </div>
                </div>
            `;
            
            document.querySelector('.result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function showError(message) {
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="error">
                    ${message}
                </div>
            `;
        }
        
        function resetForm() {
            document.getElementById('inputNumber').value = '';
            document.getElementById('resultArea').innerHTML = '';
            document.getElementById('inputNumber').focus();
        }
        
        document.getElementById('inputNumber').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                calculate();
            }
        });
        
        document.getElementById('inputNumber').focus();
    </script>
</body>
</html>
